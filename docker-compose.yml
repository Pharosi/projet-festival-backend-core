services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: festival
      POSTGRES_USER: festival
      POSTGRES_PASSWORD: festival
    ports:
      - "5432:5432"
    volumes:
      - festival_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U festival -d festival"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  festival_postgres_data:
